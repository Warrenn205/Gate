<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gate</title>
    <link rel="stylesheet" href="/gate.css">
    
</head>
<body>
    <div class="wrapper">
    <div class="navbar">
        <div class="logosection">
            <a href="/"><img src="/Gate (White).png" class="gatewhitelogo" width="179" height="53"></a>
        </div>
        <div>
            <a href="/home">Home</a>
            <a href="/projects">Projects</a>
            <a href="/crm">CRM</a>
            <a href="/scheduling">Schedules</a>
            <a href="/finance">Financials</a>
            <a href="/documents">Documents</a>
        </div>
    </div>
</div>
<br>
<br>
    <h1>CRM</h1>
    <h4>Employees</h4>
    <div class="crm_card">
    <div class="crm_card-content">
        <h2>+Add Employee</h2>
    </div>
</div>
<div id="overlay" class="prompt-overlay">
    <div class="prompt-box">
        <h1 style="font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">Add Employee</h1>
        <h2 style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">Name</h2>
        <input type="text" id="employeeName" class="prompt-input">
        <h2 style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">Age</h2>
        <input type="number" id="employeeAge" class="prompt-input">
        <h2 style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">Position</h2>
        <input type="text" id="employeePosition" class="prompt-input">
        <h2 style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">Email</h2>
        <input type="email" id="employeeEmail" class="prompt-input">
        <button id="submitEmployee" class="prompt-button">Submit</button>
        <button id="cancelEmployee" class="cancel-button">Cancel</button>
    </div>
</div>
<h4>Customers</h4>
<div class="crm_card2">
    <div class="crm_card-content2">
        <h2>+Add Customer</h2>
    </div>
</div>
<div id="overlay2" class="prompt-overlay2">
    <div class="prompt-box">
        <h1 style="font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">Add Customer</h1>
        <h2 style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">Name</h2>
        <input type="text" id="customerName" class="prompt-input2">
        <h2 style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">Email</h2>
        <input type="email" id="customerEmail" class="prompt-input2">
        <button id="submitCustomer" class="prompt-button2">Submit</button>
        <button id="cancelCustomer" class="cancel-button">Cancel</button>
    </div>
</div>
<!-- Container for displaying cards -->
<div class="right-container">
    <!-- Cards will be dynamically added here -->
</div>
    <script src="/js/script.js"></script>
</body>
</html>
