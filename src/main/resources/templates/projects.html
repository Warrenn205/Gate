<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gate</title>
    <link rel="stylesheet" href="/gate.css">
</head>
<body>
    <div class="navbar">
        <div class="logosection">
            <a href="/gate"><img src="/Gate (White).png" class="gatewhitelogo" width="179" height="53"></a>
        </div>
        <div>
            <a href="/gate">Home</a>
            <a href="/projects">Projects</a>
            <a href="/crm">CRM</a>
            <a href="/scheduling">Schedules</a>
            <a href="/finance">Financials</a>
        </div>
    </div>
    <br>
    <br>
    <div class="container">
        <h1>Projects</h1>
        <style>
        .project-pages {
            background-color: rgb(0, 157, 255);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 7px;
            cursor: pointer;
        }

        .project-pages:hover {
            background-color: rgb(20, 134, 205);
        }

        .task-pages {
            background-color: rgba(152, 13, 191, 0.96);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 7px;
            cursor: pointer;
        }

        .task-pages:hover {
            background-color: rgba(97, 8, 121, 0.96);
        }

        .page-section {
            display: none;
        }
    
        .page-section.active {
            display: block;
        }

.prompt-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    z-index: 9999;
}

.prompt-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
    width: 300px; 
    max-width: 80%;
}

.prompt-box h1 {
    margin-top: 0;
    font-size: 24px;
    text-align: center;
}

.prompt-box h2 {
    margin-top: 10px;
    font-size: 18px;
}

.prompt-input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    box-sizing: border-box;
}

.prompt-button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background-color: rgb(0, 157, 255);
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.cancel-button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background-color: rgb(231, 76, 60);
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.cancel-button:hover {
    background-color: rgb(192, 57, 43);
}

.prompt-button:hover {
    background-color: rgb(20, 134, 205);
}

.project-container {
    white-space: nowrap;
}

.project-info {
    margin-right: 10px;
    margin-bottom: 10px; 
    padding: 10px;
    border: 2px solid rgb(0, 157, 255);
    border-radius: 5px;
    background-color: #f9f9f9;
}

h2 {
    font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
}

.prompt-overlay2 {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    z-index: 9999;
}

.prompt-box2 {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
    width: 300px; 
    max-width: 80%;
}

.prompt-box2 h1 {
    margin-top: 0;
    font-size: 24px;
    text-align: center;
}

.prompt-box2 h2 {
    margin-top: 10px;
    font-size: 18px;
}

.prompt-input2 {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    box-sizing: border-box;
}

.prompt-button2 {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background-color: rgba(152, 13, 191, 0.96);
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.delete-button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background-color: rgb(192, 57, 43);
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.delete-button:hover {
    background-color: rgb(231, 76, 60);
}


.cancel-button2 {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background-color: rgb(231, 76, 60);
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.cancel-button2:hover {
    background-color: rgb(192, 57, 43);
}

.prompt-button2:hover {
    background-color: rgba(97, 8, 121, 0.96);
}

.project-container2 {
    white-space: nowrap;
}

.project-info2 {
    margin-right: 10px;
    margin-bottom: 10px; 
    padding: 10px;
    border: 2px solid rgb(0, 157, 255);
    border-radius: 5px;
    background-color: #f9f9f9;
}

.task-container2 {
    white-space: nowrap;
}

.task-info2 {
    margin-right: 10px;
    margin-bottom: 10px; 
    padding: 10px;
    border: 2px solid rgba(152, 13, 191, 0.96);
    border-radius: 5px;
    background-color: #f9f9f9;
}

    </style>
    </head>
    <body>
    
    <button class="project-pages" onclick="showSection('projects')">Projects</button>
    <button class="task-pages" onclick="showSection('tasks')">Tasks</button>
    
    <div id="projects" class="page-section active">
        <br>
        <button class="add-project" id="addProject">+ Add Project</button>
        <div id="projectContainer" class="project-container"></div>
        <br>
    </div>
    
    <div id="tasks" class="page-section">
        <br>
        <button class="add-task" id="addTask">+ Add Task</button>
        <div id="taskContainer" class="task-container"></div>
        <br>
    </div>

    <div id="addProjectModal" class="prompt-overlay">
        <div class="prompt-box">
            <h1>Add Project</h1>
            <h2>Project Name</h2>
            <input type="text" id="projectName" class="prompt-input">
            <h2>Owner</h2>
            <input type="text" id="owner" class="prompt-input">
            <h2>Due Date</h2>
            <input type="date" id="dueDate" class="prompt-input">
            <h2>Priority</h2>
            <select id="priority" class="prompt-input">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
            <button id="submitProject" class="prompt-button">Add Project</button>
            <button id="cancelProject" class="cancel-button">Cancel</button>
        </div>
    </div>

    <div id="editProjectModal" class="prompt-overlay">
        <div class="prompt-box">
            <h1>Edit Project</h1>
            <h2>Project Name</h2>
            <input type="text" id="editProjectName" class="prompt-input">
            <h2>Owner</h2>
            <input type="text" id="editOwner" class="prompt-input">
            <h2>Due Date</h2>
            <input type="date" id="editDueDate" class="prompt-input">
            <h2>Priority</h2>
            <select id="editPriority" class="prompt-input">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
            <button id="saveEdit" class="prompt-button">Save Changes</button>
            <button id="deleteProject" class="delete-button">Delete Project</button>
            <button id="cancelEdit" class="cancel-button">Cancel</button>
            
        </div>
    </div>

    <div id="projects"></div>

    <div id="addTaskModal" class="prompt-overlay2">
        <div class="prompt-box2">
            <h1>Add Task</h1>
            <h2>Task Name</h2>
            <input type="text" id="taskName" class="prompt-input2">
            <h2>Assignee</h2>
            <input type="text" id="assignee" class="prompt-input2">
            <h2>Due Date</h2>
            <input type="date" id="dueDate" class="prompt-input2">
            <h2>Priority</h2>
            <select id="priority" class="prompt-input2">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
            <button id="submitTask" class="prompt-button2">Add Task</button>
            <button id="cancelTask" class="cancel-button2">Cancel</button>
        </div>
    </div>
    
    <script>
    function showSection(sectionId) {
            var sections = document.getElementsByClassName("page-section");
            for (var i = 0; i < sections.length; i++) {
                sections[i].classList.remove("active");
            }

            var selectedSection = document.getElementById(sectionId);
            selectedSection.classList.add("active");
        }

        // Function for adding Projects
        document.getElementById("addProject").addEventListener("click", function() {
            document.getElementById("addProjectModal").style.display = "block";
        });

        document.getElementById("cancelProject").addEventListener("click", function() {
            document.getElementById("addProjectModal").style.display = "none";
        });

        document.getElementById("submitProject").addEventListener("click", function() {
            const projectName = document.getElementById("projectName").value;
            const owner = document.getElementById("owner").value;
            const dueDate = document.getElementById("dueDate").value;
            const priority = document.getElementById("priority").value;

            const projectArea = document.createElement("div");
            projectArea.classList.add("project-info");
            projectArea.style.fontFamily = "Arial, sans-serif";
            projectArea.style.backgroundColor = "rgb(0, 157, 255)";
            projectArea.style.color = "white";
            projectArea.style.padding = "10px";
            projectArea.style.margin = "10px 0";
            projectArea.innerHTML = `
                <span>Project Name: ${projectName}</span>
                <span>| Owner: ${owner}</span>
                <span>| Status: Assigned</span>
                <span>| Due Date: ${dueDate}</span>
                <span>| Priority: ${priority}</span>
            `;
            document.getElementById("projectContainer").appendChild(projectArea);

            // Add event listener for clicking on the project info block
            projectArea.addEventListener("click", function() {
                editProject(projectArea, projectName, owner, dueDate, priority);
            });

            document.getElementById("addProjectModal").style.display = "none";
        });

        function editProject(projectElement, projectName, owner, dueDate, priority) {
            document.getElementById("editProjectName").value = projectName;
            document.getElementById("editOwner").value = owner;
            document.getElementById("editDueDate").value = dueDate;
            document.getElementById("editPriority").value = priority;

            document.getElementById("editProjectModal").style.display = "block";

            document.getElementById("saveEdit").onclick = function() {
                const newProjectName = document.getElementById("editProjectName").value;
                const newOwner = document.getElementById("editOwner").value;
                const newDueDate = document.getElementById("editDueDate").value;
                const newPriority = document.getElementById("editPriority").value;

                projectElement.innerHTML = `
                    <span>Project Name: ${newProjectName}</span>
                    <span>| Owner: ${newOwner}</span>
                    <span>| Status: Assigned</span>
                    <span>| Due Date: ${newDueDate}</span>
                    <span>| Priority: ${newPriority}</span>
                `;

                // Re-add the event listener to the updated project element
                projectElement.addEventListener("click", function() {
                    editProject(projectElement, newProjectName, newOwner, newDueDate, newPriority);
                });

                document.getElementById("editProjectModal").style.display = "none";
            };

            document.getElementById("cancelEdit").onclick = function() {
                document.getElementById("editProjectModal").style.display = "none";
            };

            document.getElementById("deleteProject").onclick = function() {
                projectElement.remove();
                document.getElementById("editProjectModal").style.display = "none";
            };
        }

        // Function for adding Tasks
        document.getElementById("addTask").addEventListener("click", function() {
            document.getElementById("addTaskModal").style.display = "block";
        });

        document.getElementById("cancelTask").addEventListener("click", function() {
            document.getElementById("addTaskModal").style.display = "none";
        });

        document.getElementById("submitTask").addEventListener("click", function() {
            const taskName = document.getElementById("taskName").value;
            const assignee = document.getElementById("assignee").value;
            const dueDate = document.getElementById("dueDate").value;
            const priority = document.getElementById("priority").value;

            const taskArea = document.createElement("div");
            taskArea.classList.add("task-info");
            taskArea.style.fontFamily = "Arial, sans-serif";
            taskArea.style.backgroundColor = "rgba(152, 13, 191, 0.96)";
            taskArea.style.color = "white";
            taskArea.innerHTML = `
                <span>Task Name: ${taskName}</span>
                <span>| Assignee: ${assignee}</span>
                <span>| Status: Assigned</span>
                <span>| Due Date: ${dueDate}</span>
                <span>| Priority: ${priority}</span>
            `;
            document.getElementById("taskContainer").appendChild(taskArea);

            document.getElementById("addTaskModal").style.display = "none";
        });

    </script>
</div>
</body>
</html>
